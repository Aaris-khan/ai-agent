<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArifOS V20 • PWA Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#34C759">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root { 
            --primary: #34C759; 
            --primary-light: rgba(52, 199, 89, 0.1);
            
            /* Light Theme Default */
            --bg: #FFFFFF;      
            --card: #F9F9F9;    
            --text: #000000;    
            --muted: #8E8E93;
            --icon-bg: rgba(0, 0, 0, 0.05); 
        }

        /* DARK THEME COLORS */
        body.dark {
            --bg: #000000;      
            --card: #1C1C1E;    
            --text: #FFFFFF;    
            --muted: #8E8E93;
            --icon-bg: rgba(255, 255, 255, 0.1); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; transition: background-color 0.3s ease, color 0.3s ease; }

        .app-container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
        .view { display: none; min-height: 100vh; flex-direction: column; animation: fadeUp 0.4s ease; }
        .view.active { display: flex; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .logo-box { width: 100px; height: 100px; background: var(--card); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid var(--icon-bg); }
        
        .btn { border: none; border-radius: 18px; font-weight: 700; cursor: pointer; padding: 18px; width: 100%; font-size: 17px; transition: 0.2s; }
        .btn-green { background: var(--primary); color: #fff; box-shadow: 0 10px 20px var(--primary-light); }
        .btn-green:active { transform: scale(0.97); }

        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-round { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .icon-round:active { transform: scale(0.9); }
        .btn-theme { background: var(--icon-bg); color: var(--text); }
        .btn-logout { background: rgba(255, 59, 48, 0.1); color: #FF3B30; }

        #install-card { background: var(--card); border: 1px solid var(--icon-bg); border-radius: 24px; padding: 20px; display: none; align-items: center; justify-content: space-between; margin-top: 20px; transition: 0.3s; }

        /* NAYA OFFLINE CARD YAHAN HAI */
        .premium-action-card {
            margin-top: 30px; 
            background: #FFFFFF; 
            border-radius: 20px;
            padding: 24px 24px;
            border-left: 8px solid var(--primary);
            border-right: 8px solid var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: flex-start; 
            cursor: pointer;
            transition: 0.3s;
        }

        .premium-action-card:active {
            transform: scale(0.96);
            background: #F2F2F7;
        }

        .premium-action-text {
            font-size: 24px;
            font-weight: 800;
            color: #000000;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="view-login" class="view active app-container" style="justify-content: center; align-items: center; text-align: center;">
    <div class="logo-box">
        <i class="fa-solid fa-leaf" style="color: var(--primary); font-size: 45px;"></i>
    </div>
    <h1 style="font-size: 36px; margin-bottom: 10px;">ArifOS</h1>
    <p style="color: var(--muted); margin-bottom: 50px; font-weight: 500; letter-spacing: 1px;">V20 PRO ENGINE</p>
    
    <button class="btn btn-green" onclick="showDashboard()">Continue</button>
</div>

<div id="view-main" class="view app-container">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
        <div>
            <p style="color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Arif Intelligence</p>
            <h1 style="color: var(--primary); font-size: 38px;">Dashboard</h1>
        </div>
        
        <div class="header-icons">
            <button class="icon-round btn-theme" onclick="toggleTheme()" id="theme-btn">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="icon-round btn-logout" onclick="logoutApp()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </div>

    <div class="premium-action-card">
        <div class="premium-action-text">Offline Control</div>
    </div>

    <div id="install-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background: var(--primary); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff;">
                <i class="fa-solid fa-download"></i>
            </div>
            <div>
                <b style="font-size: 15px;">Install App</b>
                <p style="font-size: 12px; color: var(--muted);">Add to Home Screen</p>
            </div>
        </div>
        <button id="install-btn" style="background: var(--primary); color: #fff; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; font-size: 13px;">Install</button>
    </div>

</div>

<script>
    // THEME LOGIC
    function checkSavedTheme() {
        const savedTheme = localStorage.getItem('arif_theme');
        const themeBtn = document.getElementById('theme-btn');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            themeBtn.innerHTML = '<i class="fa-solid fa-sun" style="color:#FF9F0A;"></i>';
        }
    }
    checkSavedTheme(); 

    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('arif_theme', isDark ? 'dark' : 'light');
        
        const themeBtn = document.getElementById('theme-btn');
        if(isDark) {
            themeBtn.innerHTML = '<i class="fa-solid fa-sun" style="color:#FF9F0A;"></i>';
        } else {
            themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }
    }

    // PAGE SWITCH & LOGOUT
    function showDashboard() {
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-main').classList.add('active');
    }

    function logoutApp() {
        document.getElementById('view-main').classList.remove('active');
        document.getElementById('view-login').classList.add('active');
    }

    // PWA INSTALL LOGIC
    let deferredPrompt;
    const installCard = document.getElementById('install-card');
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installCard.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installCard.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }
</script>
</body>
</html>
