<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArifOS V20 • PWA Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#34C759">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root { 
            --primary: #34C759; /* Wahi Green Color */
            --primary-light: rgba(52, 199, 89, 0.1);
            --bg: #FFFFFF;      /* Safed Background */
            --card: #F9F9F9;    /* Light Gray Card */
            --text: #000000;    /* Kaala Text */
            --muted: #8E8E93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.3s; }

        /* Page System */
        .app-container { max-width: 480px; margin: 0 auto; padding: 40px 20px; }
        .view { display: none; min-height: 100vh; flex-direction: column; animation: fadeUp 0.4s ease; }
        .view.active { display: flex; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login UI */
        .logo-box { width: 100px; height: 100px; background: #fff; border-radius: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        
        /* Buttons */
        .btn { border: none; border-radius: 18px; font-weight: 700; cursor: pointer; padding: 18px; width: 100%; font-size: 17px; transition: 0.2s; }
        .btn-green { background: var(--primary); color: #fff; box-shadow: 0 10px 20px var(--primary-light); }
        .btn-green:active { transform: scale(0.97); }

        /* Install Banner */
        #install-card { background: var(--card); border: 1px solid #eee; border-radius: 24px; padding: 20px; display: none; align-items: center; justify-content: space-between; margin-top: 20px; }
    </style>
</head>
<body>

<div id="view-login" class="view active app-container" style="justify-content: center; align-items: center; text-align: center;">
    <div class="logo-box">
        <i class="fa-solid fa-leaf" style="color: var(--primary); font-size: 45px;"></i>
    </div>
    <h1 style="font-size: 36px; margin-bottom: 10px;">ArifOS</h1>
    <p style="color: var(--muted); margin-bottom: 50px; font-weight: 500; letter-spacing: 1px;">V20 PRO ENGINE</p>
    
    <button class="btn btn-green" onclick="showDashboard()">Continue</button>
</div>

<div id="view-main" class="view app-container">
    <div style="margin-bottom: 40px;">
        <p style="color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Arif Intelligence</p>
        <h1 style="color: var(--primary); font-size: 38px;">Dashboard</h1>
    </div>

    <div id="install-card">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="background: var(--primary); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff;">
                <i class="fa-solid fa-download"></i>
            </div>
            <div>
                <b style="font-size: 15px;">Install App</b>
                <p style="font-size: 12px; color: var(--muted);">Add to Home Screen</p>
            </div>
        </div>
        <button id="install-btn" style="background: var(--primary); color: #fff; border: none; padding: 10px 18px; border-radius: 12px; font-weight: 700; font-size: 13px;">Install</button>
    </div>

    </div>

<script>
    // Page Switch
    function showDashboard() {
        document.getElementById('view-login').classList.remove('active');
        document.getElementById('view-main').classList.add('active');
    }

    // PWA Logic (Install Prompt catch karna)
    let deferredPrompt;
    const installCard = document.getElementById('install-card');
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Agar app installable hai toh Green button dikhao
        installCard.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installCard.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js');
    }
</script>
</body>
</html>
